name: Publish RRG dashboard

# Runs the pipeline daily after US market close and publishes the latest
# RRG chart, momentum ranking chart, and combined dashboard to GitHub Pages,
# while archiving each day's results under archive/ for later browsing.
# Note: fixed UTC time does not auto-adjust for US daylight saving.
#
# IMPORTANT: keep all comments in this file ASCII (English), not Japanese.
# A workflow file with non-ASCII comment text was confirmed (in the sibling
# Sector_Rotation repo) to silently fail to register as a workflow at all --
# no error anywhere, just absent from `gh workflow list`.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "publish-rrg"
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ubuntu-latest has no Japanese-capable font installed by default.
      # Without this, all Japanese text in the charts renders as tofu boxes.
      - name: Install Japanese font
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (rrg_monitor -> plot_rrg -> plot_momentum_ranking)
        run: python run_pipeline.py

      - name: Build combined dashboard image
        run: python generate_dashboard.py

      - name: Prepare files for publishing and update archive
        run: python publish_latest.py

      # archive/ is intentionally tracked in git (not gitignored) so past
      # days survive future deploys, which otherwise replace the whole
      # Pages site. Commit only if there is something new (first run of the
      # day, or a retention-policy prune).
      - name: Commit archive changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add archive/
          git diff --cached --quiet && echo "No archive changes to commit" || git commit -m "Update archive $(date -u +%Y-%m-%d)"
          git push

      - name: Upload full output as artifact (debugging aid)
        uses: actions/upload-artifact@v4
        with:
          name: rrg-output
          path: output/
          retention-days: 7

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy-pages:
    needs: run-pipeline
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
